<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- DaisyUI+Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- styles -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="bg-[#F8FAFC] pb-5">
    <header class="bg-white shadow-sm">
        <nav class="mx-auto w-[90%]">
            <div class="navbar flex-col md:flex-row gap-3 md:gap-0">
                <div class="flex-1">
                    <a class="flex items-center gap-1" href="./home.html">
                        <div class="w-9"><img class="w-full" src="./assets/github-logo.png" alt="logo"></div>
                        <p class="font-semibold text-2xl">GitHub Issues Tracker</p>
                    </a>
                </div>
                <div class="flex gap-4">
                    <label id="search-field" class="input w-auto">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="input-search" type="search" required placeholder="Search" />
                    </label>
                    <div class="">
                        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section
        class="w-[80%] md:w-[72%] mx-auto bg-white rounded-lg p-6 mt-6 md:mt-14 mb-2 md:mb-4 shadow flex items-center gap-2">
        <button id="btn-all" class="btn btn-md md:w-[120px] btn-primary ">All</button>
        <button id="btn-open" class="btn btn-md md:w-[120px] text-gray-500 btn-outline/20 ">Open</button>
        <button id="btn-closed" class="btn btn-md md:w-[120px] text-gray-500 btn-outline/20 ">Closed</button>
    </section>

<section id="spinner-container" class="flex justify-center items-center p-4 md:p-8">
    <span class="loading loading-spinner loading-xl"></span>
</section>

    <section id="main-container" class="w-[80%] md:w-[72%] mx-auto bg-white rounded-md mb-6 md:mb-14 shadow">

        <div class="bg-white p-6 flex flex-col md:flex-row gap-2 md:gap-0 justify-center md:justify-between rounded-t-lg">
            <div class="flex gap-2">
                <div
                    class="p-1 md:p-2 flex items-center justify-center w-[30px] md:w-[50px] h-[30px] md:h-[50px] rounded-full bg-[#ECE4FF]">
                    <img class="w-full" src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="font-semibold text-xl text-[#1F2937]"><span id="total-issue"></span> Issues</h2>
                    <p class="text-[#64748B] text-[1rem]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <div class="flex gap-2 items-center">
                    <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div>
                    <p class="text-[1rem] text-[#1F2937] font-medium">Open</p>
                </div>
                <div class="flex gap-2 items-center">
                    <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                    <p class="text-[1rem] text-[#1F2937] font-medium">Closed</p>
                </div>

            </div>
        </div>

        <div id="card-container" class="bg-[#FBFBFB] p-6 grid grid-cols-1 md:grid-cols-4 gap-2 md:gap-3 rounded-lg">

           
        </div>
    </section>
    <!-- scripts -->
    <script src="scripts/script.js"></script>
</body>

</html>
