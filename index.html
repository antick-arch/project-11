<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- DaisyUI+Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- styles -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header class="bg-white shadow-sm">
        <nav class="mx-auto w-[90%]">
            <div class="navbar flex-col md:flex-row gap-3 md:gap-0">
                <div class="flex-1">
                    <a class="flex items-center gap-1" href="./index.html">
                        <div class="w-9"><img class="w-full" src="./assets/github-logo.png" alt="logo"></div>
                        <p class="font-semibold text-2xl">GitHub Issues Tracker</p>
                    </a>
                </div>
                <div class="flex gap-4">
                    <label class="input w-auto">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                    </label>
                    <div class="">
                        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <!-- scripts -->
    <script src="scripts/script.js"></script>
</body>

</html>
