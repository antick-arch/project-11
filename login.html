<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- DaisyUI+Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- styles -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <section class="h-screen bg-[#F8FAFC] flex items-center justify-center">
        <div class="md:w-[520px] bg-white p-8 rounded-md shadow-md space-y-6">
            <div class="flex flex-col items-center gap-6">
                <div class="w-[100px]">
                    <img class="w-full" src="./assets/github-logo.png" alt="">
                </div>
                <div>
                <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] text-[1rem]">Sign in to manage your issues</p>
                </div>
            </div>
            <fieldset class="fieldset w-full">

                <legend class="fieldset-legend text-[#3D3746] text-[1rem] font-medium">Username</legend>
                <input type="email" class="input w-full" placeholder="Enter Username" />
                <p class="label text-[#4A00FF] text-[14px]">Default: admin</p>

                <legend class="fieldset-legend text-[#3D3746] text-[1rem] font-medium">Password</legend>
                <input type="password" class="input w-full" placeholder="Enter Password" />
                <p class="label text-[#4A00FF] text-[14px]">Default: admin123</p>

                <button class="btn btn-primary rounded-md mt-4">Sign In</button>
            </fieldset>
            <div class="flex items-center justify-center gap-2">
                <hr class="w-2/4 text-[#E4E4E7]"> <span class="text-[1rem] text-[#1F2937]">OR</span> <hr class="w-2/4 text-[#E4E4E7]">
            </div>
            <div class="">
                <p class="text-center mb-2 text-[#64748B]">Demo Credentials:</p>
                <div class="py-6 bg-[#F8FAFC] text-center">
                    <p><b>Username:</b> admin</p>
                    <p><b>Password:</b> admin123</p>
                </div>
            </div>
        </div>
    </section>
    <!-- scripts -->
    <script src="scripts/script.js"></script>
</body>

</html>
